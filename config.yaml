# iii engine configuration
# Docs: https://iii.dev/docs/how-to/configure-engine
workers:
  - name: iii-observability
    config:
      enabled: true
      service_name: iii
      exporter: memory
      memory_max_spans: 10000
      metrics_enabled: true
      metrics_exporter: memory
      logs_enabled: true
      logs_exporter: memory
      logs_console_output: true
      sampling_ratio: 1.0

  - name: iii-queue
    config:
      adapter:
        name: builtin
  - name: iii-state
    config:
      adapter:
        name: kv
        config:
          store_method: file_based
          file_path: ./data/state_store.db
  - name: iii-http
    config:
      port: 3111
      host: 0.0.0.0
      default_timeout: 300000
      concurrency_request_limit: 1024
      cors:
        allowed_origins:
        - '*'
        allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
# NOTE: inference-worker and caller-worker are launched as EXTERNAL processes
# (plain python / npx tsx) on their own EC2 instances. They connect to this
# engine over WebSocket (port 49134) using III_URL, so they MUST NOT be
# declared here as managed workers.  